<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Precios de Cerrajeros</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #f0ede8;
    --text2: #999;
    --text3: #555;
    --accent: #d4a843;
    --accent2: #b8903a;
    --green: #4caf7d;
    --green-bg: #0d2318;
    --red: #e05c5c;
    --red-bg: #220f0f;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    padding: 0;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }

  .header-left h1 span {
    color: var(--accent);
  }

  .header-left p {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  button {
    font-family: var(--font-display);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    border-radius: 6px;
    font-size: 13px;
    padding: 8px 14px;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  button:hover { background: var(--surface2); border-color: #555; }
  button:active { transform: scale(0.98); }

  .btn-accent {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-accent:hover { background: var(--accent2); border-color: var(--accent2); }

  .btn-save {
    background: #1a2e1a;
    color: var(--green);
    border-color: #2a4a2a;
  }
  .btn-save:hover { background: #223a22; }

  main { padding: 2rem 2.5rem; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-value.green { color: var(--green); }
  .stat-value.accent { color: var(--accent); }

  /* Form */
  .form-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .form-panel.open { display: block; }

  .form-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 12px;
  }

  .field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }

  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
  }

  .field input::placeholder { color: var(--text3); }

  .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 4px;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 10px 14px;
    text-align: left;
    font-weight: 500;
    white-space: nowrap;
  }

  th.price-col { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface); }

  td {
    padding: 11px 14px;
    vertical-align: middle;
    color: var(--text);
  }

  .td-cerrajero {
    font-weight: 600;
    color: var(--accent);
  }

  .td-servicio {
    color: var(--text2);
    max-width: 220px;
  }

  .td-price {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 500;
    text-align: right;
    white-space: nowrap;
  }

  .td-nuestro {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 500;
    text-align: right;
    white-space: nowrap;
  }

  .diff-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    white-space: nowrap;
  }

  .diff-cheaper { background: var(--green-bg); color: var(--green); }
  .diff-expensive { background: var(--red-bg); color: var(--red); }
  .diff-same { background: #1a1a1a; color: var(--text3); }

  .td-actions {
    text-align: right;
    white-space: nowrap;
  }

  .td-actions button {
    padding: 5px 8px;
    font-size: 12px;
    border-color: transparent;
    color: var(--text3);
  }

  .td-actions button:hover { color: var(--text); border-color: var(--border2); }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text3);
  }

  .empty-state svg {
    width: 40px;
    height: 40px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .empty-state p { font-size: 14px; }

  .comparison-col {
    min-width: 160px;
  }

  .comparison-inner {
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: flex-end;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    header { padding: 1.25rem; }
    main { padding: 1.25rem; }
    th, td { padding: 8px 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Lista de Precios de <span>Cerrajeros</span></h1>
    <p id="last-saved">Sin guardar aún</p>
  </div>
  <div class="header-actions">
    <button onclick="showForm()">&#43; Agregar entrada</button>
    <button class="btn-save" onclick="exportFile()">&#8595; Guardar archivo</button>
  </div>
</header>

<main>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Entradas</div>
      <div class="stat-value" id="stat-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Precio prom. (ellos)</div>
      <div class="stat-value accent" id="stat-avg-them">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Precio prom. (nosotros)</div>
      <div class="stat-value green" id="stat-avg-us">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Diferencia prom.</div>
      <div class="stat-value" id="stat-diff">—</div>
    </div>
  </div>

  <div class="form-panel" id="form-panel">
    <div class="form-title" id="form-title">Nueva entrada</div>
    <div class="form-grid">
      <div class="field">
        <label>Cerrajero / Empresa</label>
        <input type="text" id="inp-cerrajero" placeholder="Nombre del cerrajero" />
      </div>
      <div class="field">
        <label>Servicio</label>
        <input type="text" id="inp-servicio" placeholder="Ej. Apertura de puerta" />
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Su precio ($)</label>
        <input type="number" id="inp-precio" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="field">
        <label>Nuestro precio ($)</label>
        <input type="number" id="inp-nuestro" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="field">
        <label>Notas (opcional)</label>
        <input type="text" id="inp-notas" placeholder="Ej. incluye desplazamiento" />
      </div>
    </div>
    <div class="form-actions">
      <button onclick="cancelForm()">Cancelar</button>
      <button class="btn-accent" onclick="saveEntry()"><span id="save-label">Guardar</span></button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Cerrajero</th>
          <th>Servicio</th>
          <th class="price-col">Su precio</th>
          <th class="price-col comparison-col">Nuestro precio / Comparación</th>
          <th>Notas</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
      </svg>
      <p>Sin entradas aún. Haz clic en <strong>Agregar entrada</strong> para comenzar.</p>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// DATA — injected on export
var DATA = [];

var editId = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function fmt(n) {
  if (n === '' || n === null || n === undefined || isNaN(n)) return '—';
  return '$' + parseFloat(n).toFixed(2);
}

function showForm(id) {
  editId = id || null;
  var panel = document.getElementById('form-panel');
  panel.classList.add('open');
  document.getElementById('form-title').textContent = id ? 'Editar entrada' : 'Nueva entrada';
  document.getElementById('save-label').textContent = id ? 'Actualizar' : 'Guardar';
  if (id) {
    var e = DATA.find(function(x){ return x.id === id; });
    if (e) {
      document.getElementById('inp-cerrajero').value = e.cerrajero || '';
      document.getElementById('inp-servicio').value = e.servicio || '';
      document.getElementById('inp-precio').value = e.precio !== '' ? e.precio : '';
      document.getElementById('inp-nuestro').value = e.nuestro !== '' ? e.nuestro : '';
      document.getElementById('inp-notas').value = e.notas || '';
    }
  } else {
    document.getElementById('inp-cerrajero').value = '';
    document.getElementById('inp-servicio').value = '';
    document.getElementById('inp-precio').value = '';
    document.getElementById('inp-nuestro').value = '';
    document.getElementById('inp-notas').value = '';
  }
  setTimeout(function(){ document.getElementById('inp-cerrajero').focus(); }, 50);
}

function cancelForm() {
  editId = null;
  document.getElementById('form-panel').classList.remove('open');
}

function saveEntry() {
  var cerrajero = document.getElementById('inp-cerrajero').value.trim();
  var servicio = document.getElementById('inp-servicio').value.trim();
  var precioRaw = document.getElementById('inp-precio').value;
  var nuestroRaw = document.getElementById('inp-nuestro').value;
  var notas = document.getElementById('inp-notas').value.trim();

  if (!cerrajero) { document.getElementById('inp-cerrajero').focus(); return; }
  if (!servicio) { document.getElementById('inp-servicio').focus(); return; }

  var precio = precioRaw !== '' ? parseFloat(precioRaw) : '';
  var nuestro = nuestroRaw !== '' ? parseFloat(nuestroRaw) : '';

  if (editId) {
    var idx = DATA.findIndex(function(x){ return x.id === editId; });
    if (idx > -1) DATA[idx] = { id: editId, cerrajero, servicio, precio, nuestro, notas };
  } else {
    DATA.push({ id: uid(), cerrajero, servicio, precio, nuestro, notas });
  }

  cancelForm();
  render();
  showToast(editId ? 'Entrada actualizada' : 'Entrada guardada');
  editId = null;
}

function deleteEntry(id) {
  DATA = DATA.filter(function(x){ return x.id !== id; });
  render();
  showToast('Entrada eliminada');
}

function getDiff(precio, nuestro) {
  if (precio === '' || nuestro === '' || isNaN(precio) || isNaN(nuestro)) return null;
  return nuestro - precio;
}

function render() {
  var tbody = document.getElementById('table-body');
  var empty = document.getElementById('empty-state');

  if (DATA.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('stat-count').textContent = '0';
    document.getElementById('stat-avg-them').textContent = '—';
    document.getElementById('stat-avg-us').textContent = '—';
    document.getElementById('stat-diff').textContent = '—';
    return;
  }

  empty.style.display = 'none';

  var rows = DATA.map(function(e) {
    var diff = getDiff(e.precio, e.nuestro);
    var diffHtml = '';
    if (diff !== null) {
      if (Math.abs(diff) < 0.01) {
        diffHtml = '<span class="diff-badge diff-same">Igual</span>';
      } else if (diff < 0) {
        diffHtml = '<span class="diff-badge diff-cheaper">-$' + Math.abs(diff).toFixed(2) + ' más barato</span>';
      } else {
        diffHtml = '<span class="diff-badge diff-expensive">+$' + diff.toFixed(2) + ' más caro</span>';
      }
    }

    return '<tr>' +
      '<td class="td-cerrajero">' + esc(e.cerrajero) + '</td>' +
      '<td class="td-servicio">' + esc(e.servicio) + '</td>' +
      '<td class="td-price">' + fmt(e.precio) + '</td>' +
      '<td class="td-nuestro comparison-col"><div class="comparison-inner">' + fmt(e.nuestro) + diffHtml + '</div></td>' +
      '<td style="color:var(--text2);font-size:12px;">' + esc(e.notas) + '</td>' +
      '<td class="td-actions">' +
        '<button onclick="showForm(\'' + e.id + '\')">&#9998; Editar</button> ' +
        '<button onclick="deleteEntry(\'' + e.id + '\')" style="color:var(--red);">&#215; Borrar</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  tbody.innerHTML = rows;

  // Stats
  document.getElementById('stat-count').textContent = DATA.length;

  var themPrices = DATA.filter(function(e){ return e.precio !== ''; }).map(function(e){ return parseFloat(e.precio); });
  var usPrices = DATA.filter(function(e){ return e.nuestro !== ''; }).map(function(e){ return parseFloat(e.nuestro); });

  if (themPrices.length) {
    var avg = themPrices.reduce(function(a,b){ return a+b; }, 0) / themPrices.length;
    document.getElementById('stat-avg-them').textContent = '$' + avg.toFixed(2);
  } else {
    document.getElementById('stat-avg-them').textContent = '—';
  }

  if (usPrices.length) {
    var avgUs = usPrices.reduce(function(a,b){ return a+b; }, 0) / usPrices.length;
    document.getElementById('stat-avg-us').textContent = '$' + avgUs.toFixed(2);
  } else {
    document.getElementById('stat-avg-us').textContent = '—';
  }

  if (themPrices.length && usPrices.length) {
    var avgThem2 = themPrices.reduce(function(a,b){ return a+b; }, 0) / themPrices.length;
    var avgUs2 = usPrices.reduce(function(a,b){ return a+b; }, 0) / usPrices.length;
    var d = avgUs2 - avgThem2;
    var statDiffEl = document.getElementById('stat-diff');
    if (Math.abs(d) < 0.01) {
      statDiffEl.textContent = 'Igual';
      statDiffEl.style.color = 'var(--text2)';
    } else if (d < 0) {
      statDiffEl.textContent = '-$' + Math.abs(d).toFixed(2);
      statDiffEl.style.color = 'var(--green)';
    } else {
      statDiffEl.textContent = '+$' + d.toFixed(2);
      statDiffEl.style.color = 'var(--red)';
    }
  } else {
    document.getElementById('stat-diff').textContent = '—';
  }
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function exportFile() {
  var jsonData = JSON.stringify(DATA);
  var html = document.documentElement.outerHTML;
  // Replace the DATA line with updated data
  var updated = html.replace(/var DATA = \[.*?\];/s, 'var DATA = ' + jsonData + ';');
  var blob = new Blob([updated], { type: 'text/html;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'lista_cerrajeros.html';
  a.click();
  URL.revokeObjectURL(a.href);
  var now = new Date();
  document.getElementById('last-saved').textContent = 'Guardado: ' + now.toLocaleDateString('es-MX') + ' ' + now.toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  showToast('Archivo descargado — reemplaza el anterior');
}

render();
</script>
</body>
</html>
